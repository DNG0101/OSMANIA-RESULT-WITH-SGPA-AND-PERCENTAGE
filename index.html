<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Osmania University – MBA Results Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold:  #C9A84C; --gold-lt:#E8C96A;
      --dark:  #0D0D0D; --card:   #141414;
      --border:#2A2A2A; --text:   #E8E4DC;
      --muted: #7A7570; --pass:   #4CAF7D;
      --fail:  #E05C5C; --info:   #64A0DC;
    }
    body {
      background: var(--dark); color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    }

    /* ── Header ── */
    header {
      width: 100%; padding: 44px 24px 34px; text-align: center;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #161400 0%, var(--dark) 100%);
      position: relative; overflow: hidden;
    }
    header::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 80% at 50% -10%, rgba(201,168,76,.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .ou-badge {
      display: inline-flex; align-items: center; gap: 10px;
      border: 1px solid var(--gold); border-radius: 4px;
      padding: 4px 14px; font-size: 11px; letter-spacing: .18em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 18px;
    }
    .ou-badge span { width:6px; height:6px; background:var(--gold); border-radius:50%; }
    h1 {
      font-family:'Playfair Display',serif;
      font-size:clamp(28px,5vw,48px); font-weight:900; color:#fff; line-height:1.1;
    }
    h1 em { color:var(--gold); font-style:normal; }
    .sub { margin-top:10px; font-size:12px; color:var(--muted); letter-spacing:.08em; }

    /* ── Main ── */
    main { width:100%; max-width:720px; padding:40px 24px 60px; }

    .card {
      background:var(--card); border:1px solid var(--border);
      border-radius:8px; padding:36px 32px; position:relative;
    }
    .card::after {
      content:''; position:absolute; top:0; left:24px; right:24px; height:1px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);
    }
    label {
      display:block; font-size:11px; letter-spacing:.14em;
      text-transform:uppercase; color:var(--muted); margin-bottom:10px;
    }
    .input-row { display:flex; gap:12px; align-items:stretch; }
    input[type="text"] {
      flex:1; background:#0A0A0A; border:1px solid var(--border);
      border-radius:5px; color:var(--text);
      font-family:'IBM Plex Mono',monospace; font-size:15px;
      padding:13px 16px; letter-spacing:.06em;
      transition:border-color .2s; outline:none;
    }
    input[type="text"]:focus { border-color:var(--gold); }
    input[type="text"]::placeholder { color:#3A3A3A; }
    #fetchBtn {
      background:var(--gold); color:#000; border:none; border-radius:5px;
      font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:13px;
      letter-spacing:.12em; text-transform:uppercase; padding:0 26px;
      cursor:pointer; transition:background .2s,transform .1s;
      white-space:nowrap; min-width:110px;
    }
    #fetchBtn:hover { background:var(--gold-lt); }
    #fetchBtn:active { transform:scale(.97); }
    #fetchBtn:disabled { opacity:.45; cursor:not-allowed; }
    .hint { margin-top:10px; font-size:11px; color:var(--muted); }
    .hint b { color:var(--gold); font-weight:600; }

    /* ── Messages ── */
    .msg {
      display:none; margin-top:20px; padding:14px 18px;
      border-radius:6px; font-size:12px; line-height:1.8;
    }
    .msg.error { display:block; border:1px solid #5C2020; background:#1A0808; color:var(--fail); }
    .msg.info  { display:block; border:1px solid #1A3A5C; background:#080F18; color:var(--muted); }

    /* ── Spinner ── */
    .spinner-wrap { display:none; margin-top:26px; text-align:center; color:var(--muted); font-size:12px; }
    .spinner-wrap.on { display:block; }
    .spinner {
      width:30px; height:30px; border:2px solid var(--border);
      border-top-color:var(--gold); border-radius:50%;
      animation:spin .8s linear infinite; margin:0 auto 10px;
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ── Result ── */
    #resultPanel { display:none; margin-top:32px; animation:fadeUp .4s ease both; }
    #resultPanel.on { display:block; }
    @keyframes fadeUp {
      from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)}
    }
    .result-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .result-title  { font-family:'Playfair Display',serif; font-size:22px; color:#fff; }
    .badge {
      padding:5px 16px; border-radius:20px;
      font-size:11px; font-weight:600; letter-spacing:.12em; text-transform:uppercase;
    }
    .badge.pass { background:rgba(76,175,125,.15); color:var(--pass); border:1px solid rgba(76,175,125,.3); }
    .badge.fail { background:rgba(224,92,92,.15);  color:var(--fail); border:1px solid rgba(224,92,92,.3);  }

    .info-grid {
      display:grid; grid-template-columns:1fr 1fr; gap:1px;
      background:var(--border); border:1px solid var(--border);
      border-radius:6px; overflow:hidden; margin-bottom:20px;
    }
    .ic { background:var(--card); padding:12px 16px; }
    .ic .l { font-size:10px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:4px; }
    .ic .v { font-size:13px; color:var(--text); font-weight:600; }
    .ic .v.gold { color:var(--gold); }

    .sec { font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }

    table.mt {
      width:100%; border-collapse:collapse; border:1px solid var(--border);
      border-radius:6px; overflow:hidden; margin-bottom:20px; font-size:13px;
    }
    table.mt thead tr { background:#1C1800; }
    table.mt thead th {
      padding:10px 14px; text-align:left;
      font-size:10px; letter-spacing:.12em; text-transform:uppercase;
      color:var(--gold); border-bottom:1px solid var(--border); font-weight:600;
    }
    table.mt tbody tr { border-bottom:1px solid var(--border); transition:background .15s; }
    table.mt tbody tr:last-child { border-bottom:none; }
    table.mt tbody tr:hover { background:#1A1A1A; }
    table.mt td { padding:11px 14px; vertical-align:middle; }
    table.mt td.code { color:var(--muted); font-size:12px; white-space:nowrap; }
    table.mt td.cr   { color:var(--muted); font-size:12px; text-align:center; }
    table.mt td.gd   { text-align:center; }

    .gp { display:inline-block; padding:3px 12px; border-radius:12px; font-size:12px; font-weight:600; }
    .gO  {background:rgba(76,175,125,.2); color:#4CAF7D; border:1px solid rgba(76,175,125,.4);}
    .gAp {background:rgba(60,200,180,.2); color:#3CC8B4; border:1px solid rgba(60,200,180,.4);}
    .gA  {background:rgba(100,160,220,.2);color:#64A0DC; border:1px solid rgba(100,160,220,.4);}
    .gBp {background:rgba(180,150,220,.2);color:#B496DC; border:1px solid rgba(180,150,220,.4);}
    .gB  {background:rgba(201,168,76,.15);color:var(--gold);border:1px solid rgba(201,168,76,.3);}
    .gCp {background:rgba(220,160,80,.15);color:#DCA050; border:1px solid rgba(220,160,80,.3);}
    .gC  {background:rgba(224,120,60,.15);color:#E07C3C; border:1px solid rgba(224,120,60,.3);}
    .gF  {background:rgba(224,60,60,.2);  color:var(--fail);border:1px solid rgba(224,60,60,.4);}

    footer { width:100%; text-align:center; padding:22px; font-size:11px; color:#333; border-top:1px solid var(--border); }
    @media(max-width:500px){
      .card{padding:24px 18px;}
      .info-grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
<header>
  <div class="ou-badge"><span></span>Osmania University<span></span></div>
  <h1>MBA <em>(CBCS-DAY)</em> Results</h1>
  <p class="sub">I Semester Regular Examination · February 2026</p>
</header>

<main>
  <div class="card">
    <label for="htno">Hall Ticket Number</label>
    <div class="input-row">
      <input type="text" id="htno" maxlength="12"
             placeholder="e.g. 216325672007"
             autocomplete="off" inputmode="numeric"/>
      <button id="fetchBtn" onclick="fetchResult()">Fetch →</button>
    </div>
    <p class="hint">Enter your <b>12-digit</b> hall ticket number and press Fetch.</p>

    <div class="msg" id="msgBox"></div>

    <div class="spinner-wrap" id="spinner">
      <div class="spinner"></div>
      <div id="spinLabel">Fetching results…</div>
    </div>
  </div>

  <div id="resultPanel">
    <div class="result-header">
      <div class="result-title">Exam Result</div>
      <div class="badge" id="statusBadge"></div>
    </div>
    <div class="info-grid" id="infoGrid"></div>
    <div class="sec">Marks Details</div>
    <table class="mt">
      <thead>
        <tr>
          <th>Sub Code</th><th>Subject Name</th>
          <th style="text-align:center">Credits</th>
          <th style="text-align:center">Grade</th>
        </tr>
      </thead>
      <tbody id="marksBody"></tbody>
    </table>
  </div>
</main>

<footer>Osmania University · MBA Results · 2026</footer>

<script>
  // ─────────────────────────────────────────────
  // ★  REPLACE THIS with your Cloudflare Worker URL
  //    after deploying worker.js
  //    e.g.  "https://osmania-proxy.yourname.workers.dev"
  // ─────────────────────────────────────────────
  const WORKER_URL = "https://YOUR-WORKER.workers.dev";

  function gc(g){
    return ({O:'gO','A+':'gAp',A:'gA','B+':'gBp',B:'gB','C+':'gCp',C:'gC',F:'gF',AB:'gF'})[g]||'gB';
  }
  const $ = id => document.getElementById(id);

  function showMsg(txt, type='error'){
    const el=$('msgBox'); el.innerHTML=txt; el.className='msg '+type;
  }
  function hideMsg(){ $('msgBox').className='msg'; }

  async function fetchResult(){
    const htno = $('htno').value.trim();
    const btn  = $('fetchBtn');

    hideMsg();
    $('resultPanel').className='';
    $('resultPanel').style.display='none';

    if(!htno)               return showMsg('⚠ Please enter your Hall Ticket Number.');
    if(!/^\d{12}$/.test(htno)) return showMsg('⚠ Must be exactly 12 digits. Example: 216325672007');

    // Check worker URL is configured
    if(WORKER_URL.includes('YOUR-WORKER')){
      return showMsg(
        '⚙ <b style="color:var(--gold-lt)">Setup needed:</b> Open <code>index.html</code> in a text editor '+
        'and replace <code>YOUR-WORKER.workers.dev</code> with your actual Cloudflare Worker URL.<br><br>'+
        'See the <b>README.md</b> file included for step-by-step instructions.','info'
      );
    }

    btn.disabled=true;
    $('spinner').className='spinner-wrap on';
    $('spinLabel').textContent='Fetching from Osmania University…';

    try{
      const body = new URLSearchParams({
        mbstatus:'SEARCH', htno,
        'Submit.x':'1','Submit.y':'1'
      });

      const res = await Promise.race([
        fetch(WORKER_URL, {
          method:'POST',
          headers:{'Content-Type':'application/x-www-form-urlencoded'},
          body: body.toString()
        }),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error('Request timed out after 15 seconds')),15000))
      ]);

      if(!res.ok) throw new Error('Server error: HTTP '+res.status);

      const html = await res.text();
      $('spinner').className='spinner-wrap';

      if(html.includes('error') && html.length<300){
        throw new Error('Proxy error: '+html);
      }

      parseAndRender(html, htno);

    }catch(e){
      $('spinner').className='spinner-wrap';
      showMsg('✗ '+e.message);
    }finally{
      btn.disabled=false;
    }
  }

  function parseAndRender(html, htno){
    const doc    = new DOMParser().parseFromString(html,'text/html');
    const tables = [...doc.querySelectorAll('table')];
    const allTxt = doc.body ? doc.body.textContent : '';

    if(!allTxt.includes('Hall Ticket') && !allTxt.includes('PASSED') && !allTxt.includes('FAILED')){
      showMsg('⚠ No result found for Hall Ticket No. '+htno+'. Please check the number.');
      return;
    }

    let pT=null, mT=null, rT=null;
    tables.forEach(t=>{
      const tx=t.textContent;
      if(!pT && tx.includes('Hall Ticket') && tx.includes('Father')) pT=t;
      if(!mT && (tx.includes('Sub Code')||tx.includes('Grade Secured')))      mT=t;
      if(!rT && (tx.includes('PASSED')||tx.includes('FAILED')))               rT=t;
    });

    // Personal
    let name='–',htD=htno,father='–',gender='–',course='–',medium='–';
    if(pT){
      [...pT.querySelectorAll('tr')].forEach(row=>{
        const c=[...row.querySelectorAll('td')].map(x=>x.textContent.trim().replace(/\s+/g,' '));
        if(c.length<4) return;
        if(c[0].toLowerCase().includes('hall'))   htD=c[1]||htno;
        if(c[0].toLowerCase().includes('name'))   {name=c[1];father=c[3];}
        if(c[0].toLowerCase().includes('course')) {course=c[1];medium=c[3];}
        if(c[2].toLowerCase().includes('gender')) gender=c[3];
      });
    }

    const ig=$('infoGrid'); ig.innerHTML='';
    [{l:'Hall Ticket No.',v:htD,g:'gold'},{l:'Gender',v:gender},
     {l:'Name',v:name},{l:"Father's Name",v:father},
     {l:'Course',v:course},{l:'Medium',v:medium}
    ].forEach(({l,v,g})=>{
      ig.insertAdjacentHTML('beforeend',
        `<div class="ic"><div class="l">${l}</div><div class="v ${g||''}">${v}</div></div>`);
    });

    // Marks
    const tb=$('marksBody'); tb.innerHTML='';
    if(mT){
      [...mT.querySelectorAll('tr')].forEach(row=>{
        const c=[...row.querySelectorAll('td')].map(x=>x.textContent.trim().replace(/\s+/g,' '));
        if(c.length<4) return;
        if(!c[0]||c[0].toLowerCase().includes('sub')) return;
        tb.insertAdjacentHTML('beforeend',
          `<tr><td class="code">${c[0]}</td><td>${c[1]}</td>`+
          `<td class="cr">${c[2]}</td>`+
          `<td class="gd"><span class="gp ${gc(c[3])}">${c[3]}</span></td></tr>`);
      });
    }

    // Pass/Fail
    const passed = rT ? !rT.textContent.includes('FAILED') : true;
    const badge  = $('statusBadge');
    badge.textContent = passed ? '✓  PASSED' : '✗  FAILED';
    badge.className   = 'badge '+(passed?'pass':'fail');

    const panel=$('resultPanel');
    panel.style.display='block'; panel.className='on';
    setTimeout(()=>panel.scrollIntoView({behavior:'smooth',block:'start'}),80);
  }

  $('htno').addEventListener('keydown', e=>{ if(e.key==='Enter') fetchResult(); });
</script>
</body>
</html>
